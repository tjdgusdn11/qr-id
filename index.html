<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일신분증</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

/* 상단 */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

/* 카드 */
.card{
  background:#fff;
  margin:20px;
  border-radius:20px;
  padding:20px;
}

/* 사진 */
.photo{
  width:160px;
  height:200px;
  object-fit:cover;
  border-radius:15px;
  display:block;
  margin:0 auto 20px;
}

/* 정보 */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.info{
  flex:1;
}

#name{
  font-size:22px;
  font-weight:bold;
}

#birth, #addr{
  font-size:13px;
  color:#666;
}

/* QR */
.qr{
  width:110px;
}

/* 타이머 (카드 밖) */
.timer{
  text-align:center;
  margin-top:10px;
}

.bar{
  height:6px;
  background:#ddd;
  border-radius:10px;
  margin:5px 20px;
}

.fill{
  height:6px;
  background:linear-gradient(to right,#4facfe,#8e2de2);
  width:100%;
  border-radius:10px;
}

/* 버튼 */
.bottom{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
}

.btn{
  width:90%;
  padding:15px;
  background:black;
  color:white;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
}

/* 설정 */
.setting{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
}

.setting.active{
  right:0;
}

input{
  width:100%;
  margin:10px 0;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  모바일신분증
  <div id="menu">≡</div>
</div>

<div class="card">

  <img id="photo" class="photo">

  <div class="row">
    <div class="info">
      <div id="name">홍길동</div>
      <div id="birth">070907 - 1234567</div>
      <div id="addr">전주시 덕진구</div>
    </div>

    <img id="qr" class="qr">
  </div>

</div>

<!-- 🔥 카드 밖 -->
<div class="timer">
  남은시간 <span id="time">30</span>초
</div>

<div class="bar">
  <div class="fill" id="bar"></div>
</div>

<div class="bottom">
  <div class="btn" id="toggle">상세정보 표시</div>
</div>

<!-- 설정 -->
<div class="setting" id="setting">
  <h2>설정</h2>

  <input id="inputName" placeholder="이름">
  <input id="inputBirth" placeholder="생년월일">
  <input id="inputBack" placeholder="뒷자리">
  <input id="inputAddr" placeholder="주소">
  <input type="file" id="file">

  <button onclick="save()">저장</button>
</div>

<script>

/* 🔥 DOM 연결 (이게 핵심) */
const nameEl = document.getElementById("name");
const birthEl = document.getElementById("birth");
const addrEl = document.getElementById("addr");
const qrEl = document.getElementById("qr");

/* 타이머 */
let count=30;
function timer(){
  count--;
  if(count<=0) count=30;

  document.getElementById("time").innerText=count;
  document.getElementById("bar").style.width=(count/30*100)+"%";

  setTimeout(timer,1000);
}
timer();

/* QR */
function makeQR(){
  let data=nameEl.innerText + birthEl.innerText;
  qrEl.src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+data;
}

/* 🔥 상세 / QR (완전 수정) */
let isDetail=false;

document.getElementById("toggle").onclick=function(){

  isDetail = !isDetail;

  if(isDetail){
    // 👉 상세 보여줌
    birthEl.innerText = localStorage.birth + " - " + localStorage.back;
    addrEl.innerText = localStorage.addr;
    qrEl.style.display="none";
    this.innerText="QR정보 표시";

  }else{
    // 👉 QR 상태
    birthEl.innerText="•••••• - •••••••";
    addrEl.innerText="••••••";
    qrEl.style.display="block";
    this.innerText="상세정보 표시";
  }
};

/* 설정 5번 */
let clickCount=0;
document.getElementById("menu").onclick=function(){
  clickCount++;
  if(clickCount>=5){
    document.getElementById("setting").classList.add("active");
    clickCount=0;
  }
};

/* 🔥 저장 (이름 안바뀌던거 해결) */
function save(){

  localStorage.name = document.getElementById("inputName").value;
  localStorage.birth = document.getElementById("inputBirth").value;
  localStorage.back = document.getElementById("inputBack").value;
  localStorage.addr = document.getElementById("inputAddr").value;

  nameEl.innerText = localStorage.name;
  birthEl.innerText = localStorage.birth + " - " + localStorage.back;
  addrEl.innerText = localStorage.addr;

  makeQR();

  document.getElementById("setting").classList.remove("active");
}

/* 사진 */
document.getElementById("file").onchange=function(e){
  let reader=new FileReader();
  reader.onload=function(){
    document.getElementById("photo").src=reader.result;
    localStorage.photo=reader.result;
  }
  reader.readAsDataURL(e.target.files[0]);
};

/* 🔥 초기 로딩 */
window.onload=function(){

  if(localStorage.name){
    nameEl.innerText=localStorage.name;
    birthEl.innerText=localStorage.birth+" - "+localStorage.back;
    addrEl.innerText=localStorage.addr;
  }

  if(localStorage.photo){
    document.getElementById("photo").src=localStorage.photo;
  }

  makeQR();

  // 시작은 QR 모드
  birthEl.innerText="•••••• - •••••••";
  addrEl.innerText="••••••";
};

</script>

</body>
</html>
