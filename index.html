<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개인 모바일 카드</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f3f5;
}

.top{
  background:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
  cursor:pointer;
}

.wrap{
  max-width:520px;
  margin:auto;
  padding:14px;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
}

.photo{
  width:140px;
  height:140px;
  border-radius:14px;
  background:#ddd;
  display:block;
  margin:0 auto 18px;
  object-fit:cover;
}

.name{
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.sub{
  text-align:center;
  font-size:17px;
  line-height:1.5;
}

.qr{
  display:none;
  text-align:center;
  margin-top:20px;
}

.qr img{
  width:150px;
  height:150px;
}

.btn{
  margin-top:20px;
  background:black;
  color:white;
  padding:16px;
  text-align:center;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.settings{
  display:none;
  position:fixed;
  inset:0;
  background:white;
  z-index:20;
  padding:20px;
  overflow:auto;
}

.creator{
  position:absolute;
  top:15px;
  right:15px;
  font-size:12px;
  color:#888;
}

.settings h2{
  margin:0 0 14px;
}

.settings input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:1px solid #ccc;
  border-radius:12px;
  font-size:16px;
}

.settings button{
  width:100%;
  padding:14px;
  border:0;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  margin-top:8px;
}

.save{background:#3f7ae0;color:white;}
.close{background:#ececec;color:#111;}
</style>
</head>

<body>

<div class="top" id="secret">개인 모바일 카드</div>

<div class="wrap">
  <div class="card">

    <img id="photo" class="photo" alt="사진">

    <div class="name" id="name">이름</div>
    <div class="sub" id="birth">000000-1234567</div>
    <div class="sub" id="addr">주소</div>

    <div class="qr" id="qr">
      <img id="qrImg" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=PROFILE" alt="QR">
    </div>

    <div class="btn" id="toggleBtn" onclick="toggle()">QR 표시</div>

  </div>
</div>

<div class="settings" id="settings">
  <div class="creator">이걸만든성현우</div>

  <h2>설정</h2>

  <input id="setName" placeholder="이름">
  <input id="setBirthFront" placeholder="생년월일 앞자리 예: 060907">
  <input id="setBirthBack" placeholder="뒷자리 예: 1234567">
  <input id="setAddr" placeholder="주소">
  <input id="photoInput" type="file" accept="image/*">

  <button class="save" onclick="save()">저장</button>
  <button class="close" onclick="closeSettings()">닫기</button>
</div>

<script>
let isQR = false;
let tapCount = 0;
let tapTimer = null;

let savedName = "이름";
let savedBirthFront = "060907";
let savedBirthBack = "1234567";
let savedAddr = "주소";

function updateQR(){
  const data = encodeURIComponent(savedName + " / " + savedBirthFront + "-" + savedBirthBack + " / " + savedAddr);
  document.getElementById("qrImg").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + data;
}

function renderDetail(){
  document.getElementById("name").innerText = savedName;
  document.getElementById("birth").innerText = savedBirthFront + "-" + savedBirthBack;
  document.getElementById("addr").innerText = savedAddr;
  document.getElementById("addr").style.display = "block";
}

function renderMasked(){
  document.getElementById("name").innerText = savedName;
  document.getElementById("birth").innerText = savedBirthFront + "-*******";
  document.getElementById("addr").style.display = "none";
}

function toggle(){
  const qr = document.getElementById("qr");
  const btn = document.getElementById("toggleBtn");

  if(!isQR){
    qr.style.display = "block";
    btn.innerText = "상세정보 표시";
    renderMasked();
    isQR = true;
  } else {
    qr.style.display = "none";
    btn.innerText = "QR 표시";
    renderDetail();
    isQR = false;
  }
}

function openSettings(){
  document.getElementById("setName").value = savedName;
  document.getElementById("setBirthFront").value = savedBirthFront;
  document.getElementById("setBirthBack").value = savedBirthBack;
  document.getElementById("setAddr").value = savedAddr;
  document.getElementById("settings").style.display = "block";
}

function closeSettings(){
  document.getElementById("settings").style.display = "none";
}

function save(){
  savedName = document.getElementById("setName").value || savedName;
  savedBirthFront = document.getElementById("setBirthFront").value || savedBirthFront;
  savedBirthBack = document.getElementById("setBirthBack").value || savedBirthBack;
  savedAddr = document.getElementById("setAddr").value || savedAddr;

  if(isQR){
    renderMasked();
  } else {
    renderDetail();
  }

  updateQR();
  closeSettings();
}

document.getElementById("photoInput").addEventListener("change", function(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(ev){
    document.getElementById("photo").src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById("secret").addEventListener("click", function(){
  tapCount++;

  clearTimeout(tapTimer);
  tapTimer = setTimeout(function(){
    tapCount = 0;
  }, 2000);

  if(tapCount >= 5){
    tapCount = 0;
    openSettings();
  }
});

renderDetail();
updateQR();
</script>

</body>
</html>
