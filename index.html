<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일신분증</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f3f5;
}

/* 상단 */
.top{
  background:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
  position:relative;
}

.menu{
  position:absolute;
  right:15px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}

/* 카드 */
.wrap{padding:15px;}

.card{
  background:white;
  border-radius:15px;
  padding:20px;
}

/* 제목 */
.title{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}

/* 정보 */
.row{
  display:flex;
  gap:15px;
}

.photo{
  width:100px;
  height:100px;
  border-radius:10px;
  background:#ddd;
  object-fit:cover;
}

.info{
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.name{
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

/* QR */
.qr{
  display:none;
  text-align:center;
  margin-top:20px;
}

.qr img{width:150px;}

/* 버튼 */
.btn{
  margin-top:20px;
  background:black;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

/* 설정 */
.settings{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="top">
  모바일신분증
  <div class="menu" onclick="openSettings()">☰</div>
</div>

<div class="wrap">
  <div class="card">

    <div class="title">모바일신분증</div>

    <div class="row">
      <img id="photo" class="photo">

      <div class="info">
        <div class="name" id="name">노무현</div>
        <div id="birth">000000</div>
        <div id="addr">전주시</div>
      </div>
    </div>

    <div class="qr" id="qr">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=test">
    </div>

    <div class="btn" onclick="toggle()">QR 표시</div>

  </div>
</div>

<!-- 설정 -->
<div class="settings" id="settings">

  <h2>설정</h2>

  <input id="setName" placeholder="이름">
  <input id="setBirth" placeholder="생년월일">
  <input id="setAddr" placeholder="주소">

  <!-- 🔥 갤러리 업로드 -->
  <input type="file" accept="image/*" onchange="upload(event)">

  <button onclick="save()">저장</button>
  <button onclick="closeSettings()">닫기</button>

</div>

<script>
function toggle(){
  let qr=document.getElementById("qr");
  qr.style.display = qr.style.display==="block" ? "none" : "block";
}

function openSettings(){
  document.getElementById("settings").style.display="block";
}

function closeSettings(){
  document.getElementById("settings").style.display="none";
}

function save(){
  document.getElementById("name").innerText =
    document.getElementById("setName").value;

  document.getElementById("birth").innerText =
    document.getElementById("setBirth").value;

  document.getElementById("addr").innerText =
    document.getElementById("setAddr").value;

  closeSettings();
}

/* 🔥 갤러리 업로드 */
function upload(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(){
    document.getElementById("photo").src = reader.result;
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
