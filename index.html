<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일신분증</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
  overflow:hidden;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.card{
  background:#fff;
  margin:20px;
  border-radius:20px;
  padding:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.info{
  flex:1;
}

/* 사진 */
.photo{
  width:90px;
  height:110px;
  border-radius:10px;
  object-fit:cover;
  margin-bottom:10px;
}

.qr{
  width:100px;
}

.timer{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}

.bar{
  height:5px;
  background:#ddd;
  border-radius:10px;
  margin-top:5px;
}

.fill{
  height:5px;
  background:linear-gradient(to right,#4facfe,#8e2de2);
  width:100%;
  border-radius:10px;
}

.bottom{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
}

.btn{
  width:90%;
  padding:15px;
  background:black;
  color:white;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
}

/* 설정창 */
.setting{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
}

.setting.active{
  right:0;
}

input{
  width:100%;
  margin:10px 0;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  모바일신분증
  <div id="menu">≡</div>
</div>

<div class="card">

  <!-- 사진 -->
  <img id="photo" class="photo" src="" alt="">

  <div class="row">
    <div class="info">
      <div id="name">홍길동</div>
      <div id="birth">070907 - 1234567</div>
      <div id="addr">전주시 덕진구</div>
    </div>

    <img id="qr" class="qr">
  </div>

  <div class="timer">
    남은시간 <span id="time">30</span>초
    <div class="bar">
      <div class="fill" id="bar"></div>
    </div>
  </div>

</div>

<div class="bottom">
  <div class="btn" id="toggle">상세정보 표시</div>
</div>

<!-- 설정 -->
<div class="setting" id="setting">
  <h2>설정</h2>

  <input id="inputName" placeholder="이름">
  <input id="inputBirth" placeholder="생년월일">
  <input id="inputBack" placeholder="뒷자리">
  <input id="inputAddr" placeholder="주소">

  <!-- 👇 사진 선택 -->
  <input type="file" accept="image/*" id="file">

  <button onclick="save()">저장</button>
</div>

<script>
let count=30;
let hidden=false;
let clickCount=0;

function timer(){
  count--;
  if(count<=0) count=30;

  document.getElementById("time").innerText=count;
  document.getElementById("bar").style.width=(count/30*100)+"%";

  setTimeout(timer,1000);
}
timer();

/* QR */
function makeQR(){
  let name=document.getElementById("name").innerText;
  document.getElementById("qr").src=
  "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+name;
}
makeQR();

/* 상세/QR 토글 */
document.getElementById("toggle").onclick=function(){
  hidden=!hidden;

  if(hidden){
    document.getElementById("birth").innerText="•••••• - •••••••";
    document.getElementById("addr").innerText="••••••";
    this.innerText="QR정보 표시";
  }else{
    document.getElementById("birth").innerText=
      localStorage.birth+" - "+localStorage.back;
    document.getElementById("addr").innerText=localStorage.addr;
    this.innerText="상세정보 표시";
  }
};

/* 5번 클릭 설정 */
document.getElementById("menu").onclick=function(){
  clickCount++;
  if(clickCount>=5){
    document.getElementById("setting").classList.add("active");
    clickCount=0;
  }
};

/* 저장 */
function save(){
  let name=inputName.value;
  let birth=inputBirth.value;
  let back=inputBack.value;
  let addr=inputAddr.value;

  localStorage.name=name;
  localStorage.birth=birth;
  localStorage.back=back;
  localStorage.addr=addr;

  document.getElementById("name").innerText=name;
  document.getElementById("birth").innerText=birth+" - "+back;
  document.getElementById("addr").innerText=addr;

  makeQR();

  document.getElementById("setting").classList.remove("active");
}

/* 👇 사진 선택 */
document.getElementById("file").addEventListener("change", function(e){
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=function(){
    document.getElementById("photo").src=reader.result;
    localStorage.photo=reader.result;
  }

  if(file) reader.readAsDataURL(file);
});

/* 저장된 값 불러오기 */
window.onload=function(){
  if(localStorage.name){
    name.innerText=localStorage.name;
    birth.innerText=localStorage.birth+" - "+localStorage.back;
    addr.innerText=localStorage.addr;
  }

  if(localStorage.photo){
    document.getElementById("photo").src=localStorage.photo;
  }
}
</script>

</body>
</html>
