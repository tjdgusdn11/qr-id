<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일 신분증</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
  padding-bottom:100px;
}

/* 상단 */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* 카드 */
.card{
  background:#fff;
  margin:15px;
  border-radius:20px;
  padding:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

/* 사진 */
.profile{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:12px;
}

/* 텍스트 */
.name{
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}

.info{
  margin-top:5px;
  color:#333;
}

/* QR */
.qr{
  width:130px;
  margin:15px auto;
}

/* 타이머 */
.timer{
  margin-top:10px;
}

.bar{
  height:5px;
  background:#ddd;
  border-radius:10px;
}

.fill{
  height:5px;
  background:linear-gradient(to right,blue,purple);
  width:100%;
}

/* 버튼 */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  padding:15px;
  background:#f2f2f7;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  background:#000;
  color:#fff;
  font-size:16px;
  font-weight:bold;
}

/* 설정창 */
.menu{
  position:fixed;
  right:-100%;
  top:0;
  width:80%;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
}

.menu.active{
  right:0;
}
</style>
</head>

<body>

<!-- 상단 -->
<div class="header">
  <div>모바일신분증</div>
  <div onclick="openMenu()">☰</div>
</div>

<!-- 카드 -->
<div class="card">

  <img id="photo" class="profile">

  <div class="name" id="name">홍길동</div>
  <div class="info" id="birth">●●●●●● - ●●●●●●</div>
  <div class="info" id="addr">●●●●●●</div>

  <img id="qr" class="qr">

  <div class="timer">남은시간 <span id="time">30</span>초</div>
  <div class="bar"><div id="fill" class="fill"></div></div>

</div>

<!-- 버튼 -->
<div class="bottom">
  <button onclick="toggle()">상세정보 표시</button>
</div>

<!-- 설정 -->
<div id="menu" class="menu">
  <h3>설정</h3>
  이름 <input id="setName"><br><br>
  생년월일 <input id="setBirth"><br><br>
  주소 <input id="setAddr"><br><br>
  <button onclick="save()">저장</button>
</div>

<script>
let mode="qr";
let sec=30;

function makeQR(){
  document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+Date.now();
}

makeQR();

setInterval(()=>{
  sec--;
  if(sec<=0){
    sec=30;
    makeQR();
  }
  document.getElementById("time").innerText=sec;
  document.getElementById("fill").style.width=(sec/30*100)+"%";
},1000);

/* 전환 */
function toggle(){
  if(mode==="qr"){
    document.getElementById("qr").style.display="none";

    document.getElementById("birth").innerText="2008-01-01 - 1234567";
    document.getElementById("addr").innerText="전주시";

    document.querySelector("button").innerText="QR정보 표시";

    mode="info";
  }else{
    document.getElementById("qr").style.display="block";

    document.getElementById("birth").innerText="●●●●●● - ●●●●●●";
    document.getElementById("addr").innerText="●●●●●●";

    document.querySelector("button").innerText="상세정보 표시";

    mode="qr";
  }
}

/* 설정 */
function openMenu(){
  document.getElementById("menu").classList.add("active");
}

function save(){
  document.getElementById("name").innerText =
    document.getElementById("setName").value;

  document.getElementById("birth").innerText =
    document.getElementById("setBirth").value;

  document.getElementById("addr").innerText =
    document.getElementById("setAddr").value;

  document.getElementById("menu").classList.remove("active");
}

/* 사진 */
document.getElementById("photo").onclick=()=>{
  let input=document.createElement("input");
  input.type="file";
  input.accept="image/*";

  input.onchange=e=>{
    let reader=new FileReader();
    reader.onload=function(e){
      document.getElementById("photo").src=e.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
  }
  input.click();
}
</script>

</body>
</html>
