<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정부24</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: sans-serif;
  background: #f2f3f5;
  min-height: 100vh;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 18px;
  background: #fff;
  font-weight: 700;
  font-size: 18px;
}

#menuBtn {
  font-size: 24px;
  line-height: 1;
  cursor: pointer;
  user-select: none;
}

#mainScreen {
  padding: 18px;
  padding-bottom: 160px;
}

.card {
  background: #fff;
  border-radius: 24px;
  padding: 24px 20px 24px;
  max-width: 420px;
  margin: 0 auto;
  min-height: 360px;
  position: relative;
}

#profile {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
  display: block;
  margin: 0 auto 18px auto;
  background: #ddd;
}

.name {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 6px;
}

.info {
  font-size: 14px;
  color: #555;
  line-height: 1.35;
}

#qr {
  position: absolute;
  right: 20px;
  bottom: 24px;
  width: 110px;
  height: 110px;
  display: none;
  justify-content: center;
  align-items: center;
  background: #fff;
}

#qr img,
#qr canvas {
  width: 110px !important;
  height: 110px !important;
}

.bottom-fixed {
  position: fixed;
  left: 18px;
  right: 18px;
  bottom: 18px;
}

.timer-wrap {
  margin-bottom: 12px;
}

#timeText {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 8px;
}

.bar-bg {
  width: 100%;
  height: 8px;
  background: #ddd;
  border-radius: 999px;
  overflow: hidden;
}

#barFill {
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, #2f6fff, #6a00ff);
}

#toggleBtn {
  width: 100%;
  border: none;
  background: #111;
  color: #fff;
  font-size: 17px;
  padding: 16px 12px;
  border-radius: 14px;
}

#settingsScreen {
  display: none;
  padding: 18px;
}

.settings-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.made-by {
  font-size: 12px;
  color: #666;
}

#settingsScreen h3 {
  margin: 0 0 14px;
}

#settingsScreen label {
  display: block;
  font-size: 14px;
  margin: 10px 0 6px;
}

#settingsScreen input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 10px;
  font-size: 15px;
}

.settings-buttons {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}

.settings-buttons button {
  flex: 1;
  border: none;
  padding: 14px 10px;
  border-radius: 10px;
  background: #1e88ff;
  color: #fff;
  font-size: 15px;
}

.settings-buttons .close-btn {
  background: #666;
}
</style>
</head>
<body>

<div class="header">
  <div>정부24</div>
  <div id="menuBtn">≡</div>
</div>

<div id="mainScreen">
  <div class="card">
    <img id="profile" src="https://placehold.co/120x120" alt="사진">

    <div class="name" id="nameText">홍길동</div>
    <div class="info" id="dobText">20000101-******</div>
    <div class="info" id="addrText">********</div>

    <div id="qr"></div>
  </div>
</div>

<div class="bottom-fixed" id="bottomFixed">
  <div class="timer-wrap">
    <div id="timeText">30초</div>
    <div class="bar-bg">
      <div id="barFill"></div>
    </div>
  </div>
  <button id="toggleBtn" onclick="toggleMode()">QR 표시</button>
</div>

<div id="settingsScreen">
  <div class="settings-top">
    <h3>정보 설정</h3>
    <div class="made-by">이걸 만든 대단한 성현우</div>
  </div>

  <label>이름</label>
  <input id="setName" type="text" placeholder="이름">

  <label>생년월일 앞자리</label>
  <input id="setDob1" type="text" placeholder="예: 20000101">

  <label>생년월일 뒷자리</label>
  <input id="setDob2" type="text" placeholder="예: 1234567">

  <label>주소</label>
  <input id="setAddr" type="text" placeholder="주소">

  <label>사진</label>
  <input id="setPhoto" type="file" accept="image/*">

  <div class="settings-buttons">
    <button onclick="saveSettings()">저장</button>
    <button class="close-btn" onclick="closeSettings()">닫기</button>
  </div>
</div>

<script>
let savedName = "홍길동";
let savedDob1 = "20000101";
let savedDob2 = "1234567";
let savedAddr = "서울시 강남구";
let isQRMode = false;

const qrBox = document.getElementById("qr");
const nameText = document.getElementById("nameText");
const dobText = document.getElementById("dobText");
const addrText = document.getElementById("addrText");
const toggleBtn = document.getElementById("toggleBtn");

function renderMasked() {
  nameText.textContent = savedName;
  dobText.textContent = savedDob1 + "-******";
  addrText.textContent = "********";
  dobText.style.fontSize = "14px";
  addrText.style.fontSize = "14px";
}

function renderDetail() {
  nameText.textContent = savedName;
  dobText.textContent = savedDob1 + "-" + savedDob2;
  addrText.textContent = savedAddr;
  dobText.style.fontSize = "12px";
  addrText.style.fontSize = "12px";
}

function makeQR() {
  qrBox.innerHTML = "";
  new QRCode(qrBox, {
    text: savedName + " / " + savedDob1 + "-" + savedDob2,
    width: 110,
    height: 110
  });
}

function toggleMode() {
  if (!isQRMode) {
    renderMasked();
    qrBox.style.display = "flex";
    makeQR();
    toggleBtn.textContent = "상세정보 표시";
    isQRMode = true;
  } else {
    qrBox.style.display = "none";
    renderDetail();
    toggleBtn.textContent = "QR 표시";
    isQRMode = false;
  }
}

// 설정 5번 클릭 진입
let clickCount = 0;
let firstClickTime = 0;

document.getElementById("menuBtn").addEventListener("click", function () {
  const now = Date.now();

  if (!firstClickTime || now - firstClickTime > 2000) {
    firstClickTime = now;
    clickCount = 1;
  } else {
    clickCount += 1;
  }

  if (clickCount >= 5) {
    openSettings();
    clickCount = 0;
    firstClickTime = 0;
  }
});

function openSettings() {
  document.getElementById("mainScreen").style.display = "none";
  document.getElementById("bottomFixed").style.display = "none";
  document.getElementById("settingsScreen").style.display = "block";

  document.getElementById("setName").value = savedName;
  document.getElementById("setDob1").value = savedDob1;
  document.getElementById("setDob2").value = savedDob2;
  document.getElementById("setAddr").value = savedAddr;
}

function closeSettings() {
  document.getElementById("settingsScreen").style.display = "none";
  document.getElementById("mainScreen").style.display = "block";
  document.getElementById("bottomFixed").style.display = "block";
}

function saveSettings() {
  savedName = document.getElementById("setName").value || savedName;
  savedDob1 = document.getElementById("setDob1").value || savedDob1;
  savedDob2 = document.getElementById("setDob2").value || savedDob2;
  savedAddr = document.getElementById("setAddr").value || savedAddr;

  const photoFile = document.getElementById("setPhoto").files[0];
  if (photoFile) {
    const reader = new FileReader();
    reader.onload = function (e) {
      document.getElementById("profile").src = e.target.result;
    };
    reader.readAsDataURL(photoFile);
  }

  qrBox.style.display = "none";
  isQRMode = false;
  toggleBtn.textContent = "QR 표시";
  renderMasked();
  closeSettings();
}

renderMasked();

let timeLeft = 30;
setInterval(() => {
  timeLeft--;
  if (timeLeft < 0) timeLeft = 30;

  document.getElementById("timeText").textContent = timeLeft + "초";
  document.getElementById("barFill").style.width = (timeLeft / 30 * 100) + "%";
}, 1000);
</script>

</body>
</html>
